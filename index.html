<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Borrado del Mapa — MVP Integrado</title>

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- FIREBASE (SDK modular CDN simple para MVP) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{margin:0;background:#050505;color:#eee;font-family:system-ui}
.page{display:none;padding:40px}
.page.active{display:block}
button{cursor:pointer}
#map{height:400px;border-radius:12px;margin-bottom:20px}
.routes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
.route-card{background:#111;padding:16px;border-radius:12px}
.editor-stop{display:flex;gap:10px;margin-bottom:6px}
.editor-stop input{flex:1}
</style>
</head>
<body>

<nav>
<button onclick="showPage('home')">Inicio</button>
<button onclick="showPage('dashboard')">Usuario</button>
<button onclick="showPage('ruta')">Ruta</button>
</nav>

<!-- HOME -->
<div id="page-home" class="page active">
<h1>Borrado del Mapa</h1>
<input id="salma-input" placeholder="Quiero una ruta por Japón 5 días" style="width:300px" />
<button onclick="salmaHeroSend()">Crear ruta</button>

<div id="salma-result"></div>
</div>

<!-- DASHBOARD -->
<div id="page-dashboard" class="page">
<h2>Mis rutas</h2>
<div id="maps-grid-dynamic" class="routes-grid"></div>
</div>

<!-- RUTA -->
<div id="page-ruta" class="page">
<h2 id="route-title">Ruta</h2>
<div id="map"></div>

<h3>Días</h3>
<div id="route-days"></div>

<h3>Editor</h3>
<div id="editor"></div>
<button onclick="guardarRuta()">Guardar cambios</button>
</div>

<script>

/* ------------------ ROUTER ------------------ */

function showPage(name){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
 document.getElementById('page-'+name).classList.add('active')
}


/* ------------------ FIREBASE INIT ------------------ */

const firebaseConfig = {
  apiKey: "AIzaSyDjpJMEs-I_3bAR4OP2O9thKqecgNkpjkA",
  authDomain: "borradodelmapa-85257.firebaseapp.com",
  projectId: "borradodelmapa-85257",
  storageBucket: "borradodelmapa-85257.firebasestorage.app",
  messagingSenderId: "833042338746",
  appId: "1:833042338746:web:32b58e582488c6064d8383",
  measurementId: "G-JZ00MFJEHB"
}

firebase.initializeApp(firebaseConfig)
const db=firebase.firestore()


/* ------------------ LEAFLET MAP ------------------ */

let map
let markers=[]
let currentRoute=null

function initMap(){

 if(map) return

 map=L.map('map').setView([35.6,139.7],5)

 L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 maxZoom:19
 }).addTo(map)

}


function renderMap(stops){

 markers.forEach(m=>map.removeLayer(m))
 markers=[]

 const coords=[]

 stops.forEach((s,i)=>{

 const m=L.marker([s.lat,s.lng]).addTo(map)
 .bindPopup((i+1)+". "+s.nombre)

 markers.push(m)
 coords.push([s.lat,s.lng])

 })

 if(coords.length>1){

 const line=L.polyline(coords,{color:'gold'}).addTo(map)
 map.fitBounds(line.getBounds())

 }

}


/* ------------------ SALMA JSON ------------------ */

function procesarRutaJSON(route){

 currentRoute=route

 document.getElementById('route-title').innerText=route.titulo

 const daysDiv=document.getElementById('route-days')
 daysDiv.innerHTML=''

 route.dias.forEach(d=>{

 const div=document.createElement('div')
 div.innerHTML=`<h4>Día ${d.dia}</h4>`

 d.paradas.forEach(p=>{

 const el=document.createElement('div')
 el.innerText=p.nombre
 div.appendChild(el)

 })

 daysDiv.appendChild(div)

 })

 const allStops=route.dias.flatMap(d=>d.paradas)

 initMap()
 renderMap(allStops)

 activarEditor()

}


/* ------------------ SALMA MOCK ------------------ */

function salmaHeroSend(){

 const mock={

 titulo:"Japón en 5 días",
 dias:[
 {dia:1,paradas:[
 {nombre:"Senso-ji",lat:35.7148,lng:139.7967},
 {nombre:"Ueno Park",lat:35.714,lng:139.774}
 ]},

 {dia:2,paradas:[
 {nombre:"Kamakura",lat:35.319,lng:139.546}
 ]}
 ]

 }

 procesarRutaJSON(mock)
 showPage('ruta')

}


/* ------------------ FIRESTORE SAVE ------------------ */

async function guardarRuta(){

 if(!currentRoute) return

 await db.collection("rutas").add(currentRoute)

 alert("Ruta guardada")

 cargarRutas()

}


/* ------------------ DASHBOARD RENDER ------------------ */

async function cargarRutas(){

 const grid=document.getElementById('maps-grid-dynamic')
 grid.innerHTML=''

 const snap=await db.collection('rutas').get()

 snap.forEach(doc=>{

 const r=doc.data()

 const card=document.createElement('div')
 card.className='route-card'

 card.innerHTML=`
 <strong>${r.titulo}</strong>
 <br>
 ${r.dias.length} días
 <br><br>
 <button onclick="abrirRuta('${doc.id}')">Abrir</button>
 `

 grid.appendChild(card)

 })

}


async function abrirRuta(id){

 const doc=await db.collection('rutas').doc(id).get()

 procesarRutaJSON(doc.data())
 showPage('ruta')

}


/* ------------------ EDITOR ------------------ */

function activarEditor(){

 const editor=document.getElementById('editor')
 editor.innerHTML=''

 currentRoute.dias.forEach((d,di)=>{

 d.paradas.forEach((p,pi)=>{

 const row=document.createElement('div')
 row.className='editor-stop'

 row.innerHTML=`
 <input value="${p.nombre}" onchange="editarStop(${di},${pi},this.value)">
 `

 editor.appendChild(row)

 })

 })

}


function editarStop(di,pi,val){

 currentRoute.dias[di].paradas[pi].nombre=val

}


/* ------------------ INIT ------------------ */

cargarRutas()

</script>

</body>
</html>
