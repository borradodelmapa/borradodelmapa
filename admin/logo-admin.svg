<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Fondo -->
  <rect width="192" height="192" fill="#1a1a2e" rx="0"/>

  <!-- Icono: Mapa con pin -->
  <g transform="translate(96, 96)">
    <!-- Mapa (rectángulo) -->
    <path d="M -45 -35 Q -45 -45 -35 -45 L 35 -45 Q 45 -45 45 -35 L 45 35 Q 45 45 35 45 L -35 45 Q -45 45 -45 35 Z"
          fill="none" stroke="#d4a017" stroke-width="3"/>

    <!-- Puntos de ruta -->
    <circle cx="-20" cy="-15" r="3" fill="#d4a017"/>
    <circle cx="0" cy="10" r="3" fill="#d4a017"/>
    <circle cx="25" cy="-5" r="3" fill="#d4a017"/>

    <!-- Línea de ruta -->
    <path d="M -20 -15 L 0 10 L 25 -5" stroke="#d4a017" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>
  </g>

  <!-- Texto: BDM en la esquina inferior -->
  <text x="12" y="175" font-family="Arial, sans-serif" font-weight="bold" font-size="20" fill="#d4a017">BDM</text>
</svg>
