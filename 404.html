<style>
  .public-page { min-height:100vh; background:var(--negro); }
  .public-header { padding:16px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--linea); }

<div class="public-page">

<script>
window.SALMA_API = "https://salma-api.paco-defoto.workers.dev";

function escapeHTML(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
<script src="/guide-renderer.js"></script>
<script>
(async function() {
  const slug = window.location.pathname.replace(/^\//, '').replace(/\/$/, '');
  if (!slug || slug === '404.html') {
    showError();
    return;
  }

  try {
    const db = firebase.firestore();
    const doc = await db.collection('public_guides').doc(slug).get();

    if (!doc.exists) {
      showError();
      return;
    }

    const data = doc.data();
    const routeData = JSON.parse(data.itinerarioIA);

    // Actualizar meta tags
    const title = (data.nombre || 'Guía de viaje') + ' · Borradodelmapa';
    document.getElementById('page-title').textContent = title;
    document.getElementById('og-title').content = title;
    const desc = data.summary || routeData.summary || 'Guía de viaje creada con IA';
    document.getElementById('page-desc').content = desc;
    document.getElementById('og-desc').content = desc;
    if (data.cover_image) document.getElementById('og-image').content = data.cover_image;

    // Renderizar
    const content = document.getElementById('public-content');
    document.getElementById('public-loading').remove();

    // Crear chat-area para guide-renderer
    const area = document.createElement('div');
    area.id = 'chat-area';
    content.appendChild(area);

    guideRenderer.render(routeData, { saved: true });

    // CTA
    const cta = document.createElement('div');
    cta.className = 'public-cta';
    cta.innerHTML = `
      <h3>Crea tu propia guía de viaje</h3>
      <p>Salma te prepara una guía personalizada con mapas, fotos y recomendaciones en un minuto.</p>
      <a href="/">CREAR MI GUÍA GRATIS</a>
    `;
    content.appendChild(cta);

  } catch (e) {
    console.error('Error cargando guía pública:', e);
    showError();
  }

  function showError() {
    const content = document.getElementById('public-content');
    content.innerHTML = `
      <div class="public-error">
        <h2>Esta guía no existe</h2>
        <p>Puede que se haya eliminado o que el enlace esté mal.</p>
        <a href="/" style="color:var(--dorado);">Crear mi propia guía de viaje →</a>
      </div>`;
  }
})();
</script>
