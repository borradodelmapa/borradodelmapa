name = "salma-api"
main = "salma-worker.js"
compatibility_date = "2024-01-01"

# Secret requerido (añadir con wrangler secret put OPENAI_API_KEY):
# OPENAI_API_KEY = "sk-proj-..."

[[kv_namespaces]]
binding = "SALMA_KB"
id = "b2056c0613d94feb955b92279ba02fb6"

[[r2_buckets]]
binding = "SALMA_PHOTOS"
bucket_name = "salma-photos"

# Cron: lunes 4:00 UTC = regenera fichas nivel 1 caducadas
# Cron: miércoles 4:00 UTC = genera rutas nivel 3 para países sin rutas
# Cron: diario 6:00 UTC = monitoreo precios vuelos (flight watches)
[triggers]
crons = ["0 4 * * 1", "0 4 * * 3", "0 6 * * *"]

[vars]
# Optional: use Workers AI instead — set USE_CLOUDFLARE_AI = "1" and add binding:
# [ai]
# binding = "AI"
